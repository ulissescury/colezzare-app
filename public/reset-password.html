<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colezzare — Redefinir Senha</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(ellipse at 20% 0%, #0d0a1e, #06060f 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      color: #dde;
      padding: 20px;
    }
    .card {
      background: #0d0d1e;
      border: 1px solid #ffd70022;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px #00000088;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #ffd700, #ff6b00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 12px;
      box-shadow: 0 0 24px #ffd70044;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
      letter-spacing: 1px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #888;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #ffffff08;
      border: 1px solid #ffffff15;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #ffd70055; }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      color: #000;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }
    .msg.success { background: #22c55e18; color: #22c55e; border: 1px solid #22c55e33; display: block; }
    .msg.error   { background: #f8717118; color: #f87171; border: 1px solid #f8717133; display: block; }
    .rules {
      font-size: 11px;
      color: #444;
      margin-bottom: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⭐</div>
      <h1>COLEZZARE</h1>
      <p>REDEFINIR SENHA</p>
    </div>

    <div id="form-section">
      <label>NOVA SENHA</label>
      <input type="password" id="password" placeholder="mínimo 6 caracteres"/>
      <label>CONFIRMAR SENHA</label>
      <input type="password" id="confirm" placeholder="repita a nova senha"/>
      <div class="rules">• Mínimo 6 caracteres<br/>• Use letras e números para maior segurança</div>
      <button id="btn" onclick="resetPassword()">Redefinir Senha</button>
    </div>

    <div id="success-section" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:48px;margin-bottom:16px">✅</div>
      <div style="font-size:16px;font-weight:800;color:#22c55e;margin-bottom:8px">Senha redefinida!</div>
      <div style="font-size:13px;color:#555">Você já pode fazer login no app com a nova senha.</div>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    // Pega o access_token da URL (Supabase envia como hash ou query)
    function getToken() {
      const hash = window.location.hash;
      const query = window.location.search;
      const params = new URLSearchParams(hash.replace('#','?') + '&' + query.replace('?',''));
      return params.get('access_token') || params.get('token');
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn      = document.getElementById('btn');

      if (password.length < 6) return showMsg('A senha deve ter pelo menos 6 caracteres.', 'error');
      if (password !== confirm) return showMsg('As senhas não coincidem.', 'error');

      const token = getToken();
      if (!token) return showMsg('Link inválido ou expirado. Solicite um novo no app.', 'error');

      btn.disabled = true;
      btn.textContent = 'Aguarde...';

      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (res.ok) {
          document.getElementById('form-section').style.display = 'none';
          document.getElementById('success-section').style.display = 'block';
        } else {
          showMsg(data.error || 'Erro ao redefinir senha.', 'error');
          btn.disabled = false;
          btn.textContent = 'Redefinir Senha';
        }
      } catch(e) {
        showMsg('Erro de conexão. Tente novamente.', 'error');
        btn.disabled = false;
        btn.textContent = 'Redefinir Senha';
      }
    }
  </script>
</body>
</html>
